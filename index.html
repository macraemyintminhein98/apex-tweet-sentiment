<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tweet Sentimeter</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-lg">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Tweet Sentimeter</h1>
        <p class="text-center text-gray-600 mb-6">Paste a Twitter URL or username to analyze tweet sentiment.</p>
        <form id="sentimentForm" class="space-y-4">
            <div>
                <label for="twitterInput" class="block text-sm font-medium text-gray-700">Twitter URL or Username</label>
                <input type="text" id="twitterInput" name="twitterInput" placeholder="e.g., @elonmusk or https://twitter.com/user/status/123" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Analyze Sentiment
            </button>
        </form>
        <div id="results" class="mt-6 bg-gray-50 p-4 rounded-md hidden">
            <h2 class="text-xl font-semibold text-gray-800 mb-3">Analysis Results</h2>
            <p id="sentimentText" class="text-gray-700"></p>
            <canvas id="sentimentChart" class="mt-4"></canvas>
        </div>
        <p class="text-center text-gray-500 text-xs mt-6">Powered by APEX</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.getElementById('sentimentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const input = document.getElementById('twitterInput').value;
            // In a real app, this would hit your /api/analyze endpoint.
            // For this static HTML, we'll simulate a response.
            const resultsDiv = document.getElementById('results');
            const sentimentText = document.getElementById('sentimentText');
            const ctx = document.getElementById('sentimentChart').getContext('2d');

            sentimentText.textContent = 'Processing request...';
            resultsDiv.classList.remove('hidden');

            // Simulate API call
            setTimeout(() => {
                const data = { positive: 45, negative: 25, neutral: 30 }; // Mock data
                sentimentText.textContent = `Overall Sentiment: Positive ${data.positive}%, Negative ${data.negative}%, Neutral ${data.neutral}%`;

                if (window.myChart) {
                    window.myChart.destroy();
                }
                window.myChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: ['Positive', 'Negative', 'Neutral'],
                        datasets: [{
                            data: [data.positive, data.negative, data.neutral],
                            backgroundColor: ['#4CAF50', '#F44336', '#FFEB3B'],
                            hoverOffset: 4
                        }]
                    }
                });
            }, 2000);
        });
    </script>
</body>
</html>
